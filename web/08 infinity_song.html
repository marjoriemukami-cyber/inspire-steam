<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atoti Delicacies | Campus Fuel</title>
    <style>
        :root {
            --primary-red: #20d3eb;
            --deep-brown: #6c2bb6;
            --warm-tan: #530038;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; color: var(--deep-brown); text-align: center; background-color: white; }
        
        header { background: var(--primary-red); color: white; padding: 1.5rem; border-bottom: 5px solid var(--deep-brown); }
        
        .hero { background: var(--warm-tan); padding: 60px 20px; border-bottom: 1px solid #d7ccc8; }
        .hero h2 { font-size: 2.2rem; color: var(--primary-red); margin-bottom: 10px; text-transform: uppercase; }
        .slogan { font-weight: bold; font-size: 1.5rem; color: var(--soft-brown); margin-bottom: 25px; }
        
        .btn { background: var(--primary-red); color: white; padding: 15px 35px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; transition: 0.3s; border: 2px solid var(--deep-brown); margin-bottom: 40px; }
        .btn:hover { background: var(--deep-brown); transform: translateY(-3px); }

        /* New Image Section Style */
        .promo-images { display: flex; justify-content: center; gap: 20px; padding: 0 20px; flex-wrap: wrap; }
        .promo-images img { 
            width: 300px; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 12px; 
            border: 4px solid white; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
        }

        .menu { display: flex; justify-content: center; padding: 50px 20px; flex-wrap: wrap; gap: 25px; }
        .item { border: 2px solid var(--warm-tan); padding: 30px; border-radius: 8px; width: 280px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .price { color: #d32f2f; font-size: 1.8rem; font-weight: 900; margin-top: 15px; }
        
        .footer-note { background: var(--deep-brown); padding: 25px; font-weight: bold; font-size: 1.2rem; color: #fff; }
        footer { padding: 20px; background: #1a0f0e; color: #d7ccc8; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0;">INFINITY SONG</h1>
</header>

<section class="hero">
    <h2>In the mood for the blues?<br>We got you</h2>
    <p class="slogan">"Life gets better with good music"</p>
    

    <div class="promo-images">
        <img src="./assets/image/infinity-song.JPEG" alt="Love you">
        <img src="./assets/image/infinity-song2.JPEG" alt="Cool gang">
    </div>
</section>

<section class="song">
    <div class="item">
        <h3></h3>
        <p>Hater</p>
        <p >Don't you just relate?</p>
    </div>
    
    <div class="item">
        <h3>Metamorphosis</h3>
        <p>Sweet</p>
        
    </div>

</section>

<div class="footer-note">
    🔥 Chill music for you
</div>

<footer>
    <p>&copy; 2018 Infinity Song</p>
</footer>

</body>
</html>
